# Deploy: Render → Blueprint (recomendado).
# Frontend: defina VITE_API_URL=https://manufut-api.onrender.com e redeploy.
services:
  - type: web
    name: manufut-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://manufut.onrender.com,https://manufut.vercel.app
      - key: DEV_AUTH
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
