# Deploy: Render → Blueprint (recomendado).
# Frontend: defina VITE_API_URL=https://manufut-api.onrender.com e redeploy.
services:
  - type: web
    name: manufut-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m gunicorn your_application.wsgi -c gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://manufut.onrender.com,https://manufut.vercel.app
      - key: DEV_AUTH
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
